<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 9 English Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17; --surface: #1a1928; --card: #211f35;
    --accent: #7c5cfc; --accent2: #f7b731;
    --correct: #2ecc71; --wrong: #e74c3c;
    --text: #fffffe; --muted: #a7a9be; --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; top:-200px; left:-200px; width:600px; height:600px; background:radial-gradient(circle,rgba(124,92,252,0.18) 0%,transparent 70%); pointer-events:none; z-index:0; }
  body::after { content:''; position:fixed; bottom:-150px; right:-150px; width:500px; height:500px; background:radial-gradient(circle,rgba(247,183,49,0.12) 0%,transparent 70%); pointer-events:none; z-index:0; }
  .container { max-width:680px; margin:0 auto; padding:24px 16px 80px; position:relative; z-index:1; }
  .screen { display:none; animation:fadeUp 0.4s ease; }
  .screen.active { display:block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .home-header { text-align:center; padding:40px 0 28px; }
  .badge { display:inline-block; background:rgba(124,92,252,0.2); color:var(--accent); border:1px solid rgba(124,92,252,0.4); border-radius:50px; padding:6px 16px; font-size:13px; font-weight:600; letter-spacing:0.05em; margin-bottom:20px; }
  .home-header h1 { font-family:'Sora',sans-serif; font-size:clamp(26px,6vw,40px); font-weight:800; line-height:1.15; margin-bottom:12px; }
  .home-header h1 span { color:var(--accent); }
  .home-header p { color:var(--muted); font-size:15px; line-height:1.6; max-width:440px; margin:0 auto 20px; }
  .stats-row { display:flex; gap:10px; justify-content:center; margin-bottom:28px; flex-wrap:wrap; }
  .stat-pill { background:var(--card); border:1px solid rgba(255,255,255,0.07); border-radius:50px; padding:8px 16px; font-size:13px; font-weight:600; color:var(--muted); }
  .stat-pill span { color:var(--accent2); }

  .chapter-grid { display:flex; flex-direction:column; gap:9px; }
  .chapter-card { background:var(--card); border:1px solid rgba(255,255,255,0.07); border-radius:var(--radius); padding:15px 17px; cursor:pointer; transition:all 0.25s ease; display:flex; align-items:center; gap:13px; }
  .chapter-card:hover { border-color:var(--accent); background:rgba(124,92,252,0.1); transform:translateY(-2px); }
  .chapter-num { width:40px; height:40px; border-radius:11px; background:rgba(124,92,252,0.2); display:flex; align-items:center; justify-content:center; font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:var(--accent); flex-shrink:0; }
  .chapter-info { flex:1; }
  .chapter-info h3 { font-family:'Sora',sans-serif; font-weight:700; font-size:14px; margin-bottom:3px; }
  .chapter-info p { color:var(--muted); font-size:12px; }
  .chapter-arrow { color:var(--muted); font-size:20px; flex-shrink:0; }

  .quiz-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .back-btn { width:40px; height:40px; border-radius:12px; background:var(--card); border:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; flex-shrink:0; transition:background 0.2s; }
  .back-btn:hover { background:rgba(255,255,255,0.1); }
  .quiz-title { flex:1; }
  .quiz-title h2 { font-family:'Sora',sans-serif; font-weight:700; font-size:15px; }
  .quiz-title p { color:var(--muted); font-size:12px; }

  .progress-bar { height:6px; background:rgba(255,255,255,0.08); border-radius:99px; margin-bottom:22px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),#a78bfa); border-radius:99px; transition:width 0.4s ease; }

  .question-card { background:var(--card); border:1px solid rgba(255,255,255,0.07); border-radius:var(--radius); padding:22px; margin-bottom:14px; }
  .q-counter { font-size:12px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; }
  .q-text { font-family:'Sora',sans-serif; font-size:16px; font-weight:600; line-height:1.5; }

  .options { display:flex; flex-direction:column; gap:8px; }
  .option-btn { background:var(--surface); border:1.5px solid rgba(255,255,255,0.08); border-radius:12px; padding:13px 15px; text-align:left; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); transition:all 0.2s ease; display:flex; align-items:center; gap:11px; }
  .option-btn:hover:not(:disabled) { border-color:var(--accent); background:rgba(124,92,252,0.1); }
  .option-letter { width:28px; height:28px; border-radius:8px; background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; transition:all 0.2s; }
  .option-btn.correct { border-color:var(--correct); background:rgba(46,204,113,0.12); }
  .option-btn.correct .option-letter { background:var(--correct); color:#fff; }
  .option-btn.wrong { border-color:var(--wrong); background:rgba(231,76,60,0.12); }
  .option-btn.wrong .option-letter { background:var(--wrong); color:#fff; }
  .option-btn:disabled { cursor:default; }

  .feedback { border-radius:12px; padding:13px 15px; font-size:14px; font-weight:500; margin-bottom:12px; display:none; }
  .feedback.correct { background:rgba(46,204,113,0.15); border:1px solid rgba(46,204,113,0.3); color:#2ecc71; display:flex; align-items:center; gap:8px; }
  .feedback.wrong { background:rgba(231,76,60,0.15); border:1px solid rgba(231,76,60,0.3); color:#e74c3c; display:flex; align-items:center; gap:8px; }

  .next-btn { width:100%; background:var(--accent); color:#fff; border:none; border-radius:12px; padding:15px; font-family:'Sora',sans-serif; font-weight:700; font-size:15px; cursor:pointer; transition:opacity 0.2s,transform 0.1s; display:none; }
  .next-btn:hover { opacity:0.9; }
  .next-btn:active { transform:scale(0.98); }
  .next-btn.visible { display:block; }

  .result-screen { text-align:center; padding:40px 0; }
  .result-emoji { font-size:60px; margin-bottom:16px; display:block; }
  .result-screen h2 { font-family:'Sora',sans-serif; font-size:26px; font-weight:800; margin-bottom:8px; }
  .result-screen>p { color:var(--muted); margin-bottom:26px; font-size:15px; }
  .score-circle { width:130px; height:130px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 26px; }
  .score-inner { width:100px; height:100px; border-radius:50%; background:var(--card); display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .score-num { font-family:'Sora',sans-serif; font-size:28px; font-weight:800; color:var(--accent); }
  .score-label { font-size:11px; color:var(--muted); }
  .score-stats { display:flex; gap:10px; justify-content:center; margin-bottom:26px; }
  .stat-box { background:var(--card); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:12px 18px; text-align:center; }
  .stat-box .val { font-family:'Sora',sans-serif; font-size:20px; font-weight:700; }
  .stat-box .lbl { font-size:11px; color:var(--muted); margin-top:2px; }
  .stat-box.good .val { color:var(--correct); }
  .stat-box.bad .val { color:var(--wrong); }
  .result-btns { display:flex; flex-direction:column; gap:10px; max-width:300px; margin:0 auto; }
  .btn-primary { background:var(--accent); color:#fff; border:none; border-radius:12px; padding:14px; font-family:'Sora',sans-serif; font-weight:700; font-size:15px; cursor:pointer; transition:opacity 0.2s; }
  .btn-primary:hover { opacity:0.9; }
  .btn-secondary { background:transparent; color:var(--muted); border:1.5px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px; font-family:'Sora',sans-serif; font-weight:600; font-size:15px; cursor:pointer; transition:all 0.2s; }
  .btn-secondary:hover { border-color:var(--accent); color:var(--text); }
</style>
</head>

<div class="container">
  <div class="screen active" id="homeScreen">
    <div class="home-header">
      <div class="badge">📚 Class 9 · English</div>
      <h1>Master Your<br><span>English</span> Exam</h1>
      <p>Practice chapter-wise MCQs from your Class 9 English textbook. Pick a chapter to begin.</p>
      <div class="stats-row">
        <div class="stat-pill"><span>16</span> Chapters</div>
        <div class="stat-pill"><span>160</span> Questions</div>
        <div class="stat-pill"><span>100%</span> Free</div>
      </div>
    </div>
    <div class="chapter-grid" id="chapterGrid"></div>
  </div>

  <div class="screen" id="quizScreen">

        <p id="quizChapterSub"></p>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="question-card">

      <div class="q-text" id="qText"></div>
    </div>
    <div class="options" id="optionsContainer"></div>
    <div style="margin-top:13px;">
      <div class="feedback" id="feedbackBox"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>

  <div class="screen" id="resultScreen">
    <div class="result-screen">
      <span class="result-emoji" id="resultEmoji"></span>
      <h2 id="resultTitle"></h2>
      <p id="resultSubtitle"></p>
      <div class="score-circle" id="scoreCircle">
        <div class="score-inner">
          <div class="score-num" id="scoreNum"></div>
          <div class="score-label">score</div>
        </div>
      </div>
      <div class="score-stats">
        <div class="stat-box good"><div class="val" id="correctCount"></div><div class="lbl">Correct</div></div>
        <div class="stat-box bad"><div class="val" id="wrongCount"></div><div class="lbl">Wrong</div></div>
        <div class="stat-box"><div class="val" id="totalCount"></div><div class="lbl">Total</div></div>
      </div>
      <div class="result-btns">
        <button class="btn-primary" id="retryBtn">🔄 Try Again</button>
        <button class="btn-secondary" onclick="goHome()">← All Chapters</button>
      </div>
    </div>
  </div>
</div>

let currentChapter=null,currentQ=0,score=0,answered=false;

function buildHome(){
  const grid=document.getElementById('chapterGrid');
  grid.innerHTML='';
  data.chapters.forEach((ch,idx)=>{
    const card=document.createElement('div');
    card.className='chapter-card';
    card.onclick=()=>startQuiz(idx);
    card.innerHTML=`<div class="chapter-num">${ch.chapter_number}</div><div class="chapter-info"><h3>${ch.chapter_name}</h3><p>${ch.topics.join(' · ')} · ${ch.questions.length} questions</p></div><div class="chapter-arrow">›</div>`;
    grid.appendChild(card);
  });
}

function startQuiz(idx){
  currentChapter=idx; currentQ=0; score=0;
  showScreen('quizScreen');
  const ch=data.chapters[idx];
  document.getElementById('quizChapterName').textContent=ch.chapter_name;
  document.getElementById('quizChapterSub').textContent=`Chapter ${ch.chapter_number} · ${ch.questions.length} Questions`;
  renderQuestion();
}

function renderQuestion(){
  const ch=data.chapters[currentChapter],q=ch.questions[currentQ];
  answered=false;
  const total=ch.questions.length;
  document.getElementById('qCounter').textContent=`Question ${currentQ+1} of ${total}`;
  document.getElementById('qText').textContent=q.question;
  document.getElementById('progressFill').style.width=`${(currentQ/total)*100}%`;
  const container=document.getElementById('optionsContainer');
  container.innerHTML='';
  ['A','B','C','D'].forEach((letter,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.onclick=()=>selectAnswer(btn,letter,q.correct);
    btn.innerHTML=`<span class="option-letter">${letter}</span> ${q.options[i].substring(3)}`;
    container.appendChild(btn);
  });
  document.getElementById('feedbackBox').className='feedback';
  document.getElementById('nextBtn').classList.remove('visible');
}

function selectAnswer(btn,chosen,correct){
  if(answered)return;
  answered=true;
  const allBtns=document.querySelectorAll('.option-btn');
  allBtns.forEach(b=>b.disabled=true);
  ['A','B','C','D'].forEach((l,i)=>{
    if(l===correct)allBtns[i].classList.add('correct');
    else if(l===chosen&&chosen!==correct)allBtns[i].classList.add('wrong');
  });
  const fb=document.getElementById('feedbackBox');
  if(chosen===correct){score++;fb.className='feedback correct';fb.innerHTML='✅ Correct! Well done.';}
  else{fb.className='feedback wrong';fb.innerHTML=`❌ Wrong! Correct answer is <strong>${correct}</strong>.`;}
  document.getElementById('nextBtn').classList.add('visible');
  document.getElementById('nextBtn').textContent=currentQ===data.chapters[currentChapter].questions.length-1?'See Results 🏆':'Next Question →';
}

function nextQuestion(){
  if(currentQ<data.chapters[currentChapter].questions.length-1){currentQ++;renderQuestion();}
  else showResult();
}

function showResult(){
  const total=data.chapters[currentChapter].questions.length,pct=Math.round((score/total)*100);
  const map=pct>=80?['🏆','Excellent!','You really know this chapter!']:pct>=60?['👍','Good Job!','A little more practice and you will ace it!']:pct>=40?['📖','Keep Studying!','Review the chapter and try again.']:['💪',"Don't Give Up!",'Read carefully and retry.'];
  document.getElementById('resultEmoji').textContent=map[0];
  document.getElementById('resultTitle').textContent=map[1];
  document.getElementById('resultSubtitle').textContent=map[2];
  document.getElementById('scoreNum').textContent=`${pct}%`;
  document.getElementById('correctCount').textContent=score;
  document.getElementById('wrongCount').textContent=total-score;
  document.getElementById('totalCount').textContent=total;
  const deg=(pct/100)*360;
  document.getElementById('scoreCircle').style.background=`conic-gradient(var(--accent) ${deg}deg,rgba(255,255,255,0.05) ${deg}deg)`;
  document.getElementById('retryBtn').onclick=()=>startQuiz(currentChapter);
  showScreen('resultScreen');
}

function goHome(){showScreen('homeScreen');}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

buildHome();
</script>
